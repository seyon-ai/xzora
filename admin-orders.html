<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>XZORA Admin — Orders</title><link rel="stylesheet" href="admin.css"/></head><body>
<div id="xz-cursor"></div><div id="xz-ring"></div>
<aside class="sidebar"><div class="sb-logo"><a href="index.html">XZ<span>O</span>RA</a><div class="sb-role">Admin Panel</div></div><div class="sb-user"><div class="sb-avatar" id="sbAvatar" style="background:var(--accent)">A</div><div><p class="sb-uname" id="sbName">Admin</p><p class="sb-uemail" id="sbEmail"></p></div></div><nav class="sb-nav"><a href="admin-dashboard.html" class="sb-item"><span class="sb-icon">🏠</span>Dashboard</a><a href="admin-orders.html" class="sb-item on"><span class="sb-icon">🛍️</span>All Orders</a><a href="admin-sellers.html" class="sb-item "><span class="sb-icon">🏪</span>Sellers</a><a href="admin-users.html" class="sb-item "><span class="sb-icon">👥</span>Users</a><a href="admin-products.html" class="sb-item "><span class="sb-icon">📦</span>Products</a><a href="admin-commission.html" class="sb-item "><span class="sb-icon">💰</span>Commission</a><a href="admin-ai.html" class="sb-item "><span class="sb-icon">🤖</span>AI Control</a></nav><div class="sb-bottom"><button class="sb-logout" id="logoutBtn"><span class="sb-icon">🚪</span>Sign Out</button></div></aside>
<div class="main-wrap"><div class="top-bar"><span class="page-title">ALL ORDERS</span><div class="top-actions"><select class="form-select" id="sf" onchange="filterOrders()" style="padding:7px 12px;font-size:12px;width:auto"><option value="">All</option><option value="confirmed">Confirmed</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select></div></div>
<div class="content">
<div class="stats-row" style="grid-template-columns:repeat(5,1fr)"><div class="stat-card"><div class="sc-label">Total Orders</div><div class="sc-value" id="sAll">0</div></div><div class="stat-card"><div class="sc-label">Revenue</div><div class="sc-value" id="sRev" style="font-size:20px">₹0</div></div><div class="stat-card"><div class="sc-label">COD Orders</div><div class="sc-value" id="sCod">0</div></div><div class="stat-card"><div class="sc-label">Online Orders</div><div class="sc-value" id="sOnline">0</div></div><div class="stat-card"><div class="sc-label">Commission</div><div class="sc-value" id="sComm" style="font-size:20px">₹0</div></div></div>
<div class="card"><table><thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Items</th><th>Amount</th><th>Payment</th><th>Status</th><th>Update</th></tr></thead><tbody id="ordersTbl"><tr><td colspan="8" style="color:var(--muted);text-align:center;padding:32px">Loading...</td></tr></tbody></table></div>
</div></div>
<script type="module">
import { initCursor, toast } from './utils.js';
import { requireAdmin, logout } from './auth.js';
import { getAllOrders } from './admin.js';
import { updateOrderStatus } from './seller.js';
initCursor();
let allOrders=[];
requireAdmin().then(async user=>{document.getElementById('sbAvatar').textContent=(user.displayName||'A').charAt(0).toUpperCase();document.getElementById('sbName').textContent=user.displayName||'Admin';document.getElementById('sbEmail').textContent=user.email||'';loadOrders();});
document.getElementById('logoutBtn').onclick=()=>logout();
async function loadOrders(){try{allOrders=await getAllOrders(100);updateStats(allOrders);renderOrders(allOrders);}catch(e){document.getElementById('ordersTbl').innerHTML=`<tr><td colspan="8" style="color:var(--red);text-align:center">${e.message}</td></tr>`;}}
function updateStats(o){document.getElementById('sAll').textContent=o.length;document.getElementById('sRev').textContent='₹'+o.reduce((s,x)=>s+(x.total||0),0).toLocaleString('en-IN');document.getElementById('sCod').textContent=o.filter(x=>x.payment?.method==='COD').length;document.getElementById('sOnline').textContent=o.filter(x=>x.payment?.method!=='COD').length;document.getElementById('sComm').textContent='₹'+(o.reduce((s,x)=>s+(x.total||0),0)*0.05).toLocaleString('en-IN');}
function renderOrders(orders){document.getElementById('ordersTbl').innerHTML=orders.length?orders.map(o=>`<tr><td style="color:var(--accent)">${o.orderId}</td><td>${o.createdAt?.toDate?.()?.toLocaleDateString('en-IN',{day:'numeric',month:'short'})||'—'}</td><td>${o.userName||'Customer'}</td><td>${o.items?.length||0}</td><td>₹${o.total?.toLocaleString('en-IN')}</td><td>${o.payment?.method||'COD'}</td><td><span class="status-pill sp-${o.status||'confirmed'}">${o.status||'confirmed'}</span></td><td><select class="form-select" style="padding:4px 8px;font-size:11px;width:auto" onchange="updateStat('${o.orderId}',this.value)"><option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option><option value="processing" ${o.status==='processing'?'selected':''}>Processing</option><option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option><option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option><option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option></select></td></tr>`).join(''):'<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:24px">No orders found</td></tr>';}
window.filterOrders=()=>{const f=document.getElementById('sf').value;renderOrders(f?allOrders.filter(o=>o.status===f):allOrders);};
window.updateStat=async(id,s)=>{try{await updateOrderStatus(id,s);toast('Updated','success');}catch(e){toast(e.message,'error');}};
</script></body></html>
