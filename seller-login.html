<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XZORA — Seller Login</title>
<link rel="stylesheet" href="main.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-wrap{width:100%;max-width:420px;padding:20px}
.login-logo{font-family:var(--font-display);font-size:32px;letter-spacing:5px;color:var(--white);text-align:center;margin-bottom:4px}
.login-logo span{color:var(--accent)}
.login-sub{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);text-align:center;margin-bottom:32px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px}
.login-title{font-family:var(--font-display);font-size:28px;letter-spacing:2px;color:var(--white);margin-bottom:6px}
.login-desc{font-size:13px;color:var(--muted);margin-bottom:22px}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0}
.div-line{flex:1;height:1px;background:var(--border)}
.div-text{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.soc-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-body);font-size:13px;cursor:none;transition:all .2s;margin-bottom:10px}
.soc-btn:hover{border-color:var(--accent);color:var(--accent)}
.register-link{text-align:center;font-size:12px;color:var(--muted);margin-top:16px}
.register-link a{color:var(--accent);text-decoration:none}
.back-link{text-align:center;margin-top:20px;font-size:12px;color:var(--muted)}
.back-link a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div id="xz-cursor"></div><div id="xz-ring"></div>
<div class="login-wrap">
  <div class="login-logo">XZ<span>O</span>RA</div>
  <div class="login-sub">Seller Portal</div>
  <div class="login-card">
    <h2 class="login-title">SELLER SIGN IN</h2>
    <p class="login-desc">Access your seller dashboard to manage products, orders, and earnings.</p>
    <button class="soc-btn" id="googleBtn"><svg viewBox="0 0 24 24" width="16"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google</button>
    <div class="divider"><div class="div-line"></div><span class="div-text">or email</span><div class="div-line"></div></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="sellerEmail" placeholder="seller@example.com"/></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="sellerPass" placeholder="Your password"/></div>
    <button class="btn btn-primary btn-full" style="margin-top:4px" id="loginBtn" onclick="doLogin()">Sign In to Seller Portal</button>
    <div class="register-link">New seller? <a href="#">Apply to sell on Xzora →</a></div>
  </div>
  <div class="back-link"><a href="index.html">← Back to Xzora</a></div>
</div>
<script type="module">
import { initCursor, toast } from './utils.js';
import { loginWithEmail, loginWithGoogle, onAuth, getUserRole } from './auth.js';
import { db } from './firebase-config.js';
import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
initCursor();

onAuth(async u=>{ if(u){ const role=await getUserRole(u.uid); if(role==='seller'||role==='admin') window.location.href='seller-dashboard.html'; } });

async function ensureSellerDoc(user) {
  const ref = doc(db,'sellers',user.uid);
  const snap = await getDoc(ref);
  if(!snap.exists()) {
    await setDoc(ref,{uid:user.uid,email:user.email,displayName:user.displayName||'',role:'seller',status:'active',commission:5,createdAt:serverTimestamp(),revenue:0,orders:0,rating:0});
    await setDoc(doc(db,'users',user.uid),{role:'seller'},{merge:true});
  }
}

window.doLogin=async function(){
  const email=document.getElementById('sellerEmail').value.trim();
  const pass=document.getElementById('sellerPass').value;
  const btn=document.getElementById('loginBtn');
  btn.textContent='Signing in...'; btn.disabled=true;
  try{
    const user=await loginWithEmail(email,pass);
    await ensureSellerDoc(user);
    toast('Welcome back!','success');
    setTimeout(()=>window.location.href='seller-dashboard.html',600);
  }catch(e){toast(e.message,'error');btn.textContent='Sign In to Seller Portal';btn.disabled=false;}
};

document.getElementById('googleBtn').onclick=async()=>{
  try{
    const user=await loginWithGoogle();
    await ensureSellerDoc(user);
    window.location.href='seller-dashboard.html';
  }catch(e){toast(e.message,'error');}
};
</script>
</body>
</html>
