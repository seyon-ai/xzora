<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XZORA — Cart</title>
<link rel="stylesheet" href="main.css"/>
<style>
.cart-page{padding:calc(var(--nav-h)+24px) 60px 60px;display:grid;grid-template-columns:1fr 360px;gap:28px;min-height:100vh}
.cart-title{font-family:var(--font-display);font-size:40px;letter-spacing:2px;color:var(--white);margin-bottom:24px}
.cart-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:16px;margin-bottom:12px;transition:border-color .2s}
.cart-item:hover{border-color:var(--border2)}
.ci-img{width:88px;height:88px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;overflow:hidden}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1}
.ci-brand{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.ci-name{font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.4}
.ci-variant{font-size:11px;color:var(--muted2);margin-bottom:10px}
.ci-bottom{display:flex;align-items:center;justify-content:space-between}
.ci-price{font-size:16px;color:var(--accent);font-weight:500}
.ci-old{font-size:11px;color:var(--muted2);text-decoration:line-through;margin-left:6px}
.ci-actions{display:flex;align-items:center;gap:8px}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.qb{width:28px;height:28px;background:var(--surface2);border:none;color:var(--text);font-size:14px;cursor:none;transition:background .2s}
.qb:hover{background:var(--surface3)}
.qv{width:34px;height:28px;background:var(--bg);color:var(--text);border:none;text-align:center;font-family:var(--font-body);font-size:13px}
.rm-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--muted);font-size:16px;cursor:none;transition:all .2s;display:flex;align-items:center;justify-content:center}
.rm-btn:hover{border-color:var(--red);color:var(--red);background:rgba(224,82,82,.08)}
.summary-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;position:sticky;top:calc(var(--nav-h)+24px);height:fit-content}
.sum-title{font-family:var(--font-display);font-size:24px;letter-spacing:2px;color:var(--white);margin-bottom:20px}
.sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:12px}
.sum-row .lbl{color:var(--muted)}
.sum-row .val{color:var(--text)}
.sum-row.discount .val{color:var(--green)}
.sum-row.total{border-top:1px solid var(--border);padding-top:14px;margin-top:4px;font-size:16px}
.sum-row.total .lbl{color:var(--text);font-weight:500}
.sum-row.total .val{color:var(--accent);font-family:var(--font-display);font-size:22px;letter-spacing:1px}
.coupon-row{display:flex;gap:8px;margin:16px 0}
.coupon-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--font-body);font-size:12px;outline:none}
.coupon-row input:focus{border-color:var(--accent)}
.coupon-row button{padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:12px;cursor:none;transition:all .2s}
.coupon-row button:hover{border-color:var(--accent);color:var(--accent)}
.safe-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.sb-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
@media(max-width:1024px){.cart-page{grid-template-columns:1fr;padding:calc(var(--nav-h)+16px) 20px 40px}}
</style>
</head>
<body>
<div id="xz-cursor"></div><div id="xz-ring"></div>
<nav class="xz-nav">
  <a href="index.html" class="logo">XZ<span>O</span>RA</a>
  <div class="nav-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;stroke:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Search products..." onkeydown="if(event.key==='Enter')window.location='products.html?q='+encodeURIComponent(this.value)"/></div>
  <div class="nav-right">
    <a href="cart.html" class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="badge cart-count" style="display:none">0</span></a>
    <a href="auth.html" class="nav-btn" id="navAuthBtn">Sign In</a>
  </div>
</nav>
<div class="cart-page">
  <div>
    <h1 class="cart-title">MY CART</h1>
    <div id="cartItems"></div>
  </div>
  <div>
    <div class="summary-box">
      <p class="sum-title">ORDER SUMMARY</p>
      <div class="sum-row"><span class="lbl">Subtotal</span><span class="val" id="sumSubtotal">₹0</span></div>
      <div class="sum-row discount"><span class="lbl">Discount</span><span class="val" id="sumDiscount">–₹0</span></div>
      <div class="sum-row"><span class="lbl">Delivery</span><span class="val" id="sumDelivery">₹0</span></div>
      <div class="sum-row total"><span class="lbl">Total</span><span class="val" id="sumTotal">₹0</span></div>
      <div class="coupon-row"><input type="text" id="couponInput" placeholder="Enter coupon code"/><button onclick="applyCoupon()">Apply</button></div>
      <button class="btn btn-primary btn-full btn-lg" id="checkoutBtn" onclick="goCheckout()" style="margin-bottom:10px">Proceed to Checkout</button>
      <a href="products.html" class="btn btn-ghost btn-full" style="justify-content:center">Continue Shopping</a>
      <div class="safe-badges">
        <div class="sb-item">🔒 Secure Checkout</div>
        <div class="sb-item">↩️ 7-Day Returns</div>
        <div class="sb-item">🚚 Free Delivery ₹499+</div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { initCursor, toast, updateCartBadge } from './utils.js';
import { onAuth } from './auth.js';
import { listenCart, removeFromCart, updateCartQty, calcCartTotals } from './cart.js';
initCursor();
let cartItems=[];
onAuth(u=>{ if(u){document.getElementById('navAuthBtn').textContent=u.displayName?.split(' ')[0]||'Account';document.getElementById('navAuthBtn').href='profile.html';} });

listenCart(items=>{
  cartItems=items;
  updateCartBadge(items.reduce((s,i)=>s+i.qty,0));
  renderCart(items);
  updateSummary(items);
});

function renderCart(items){
  const el=document.getElementById('cartItems');
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🛒</div><h2 class="empty-title">YOUR CART IS EMPTY</h2><p class="empty-sub">Looks like you haven't added anything yet. Start exploring!</p><a href="products.html" class="btn btn-primary btn-sm" style="display:inline-flex;margin-top:8px">Shop Now</a></div>`;
    return;
  }
  el.innerHTML=items.map(i=>`
    <div class="cart-item" id="ci-${i.id}">
      <div class="ci-img">${i.imageUrl?`<img src="${i.imageUrl}" alt="${i.name}" loading="lazy"/>`:(i.emoji||'📦')}</div>
      <div class="ci-info">
        <p class="ci-brand">${i.brand||''}</p>
        <p class="ci-name">${i.name}</p>
        ${i.variant?`<p class="ci-variant">${Object.entries(i.variant).map(([k,v])=>`${k}: ${v}`).join(' · ')}</p>`:''}
        <div class="ci-bottom">
          <div><span class="ci-price">₹${(i.price*i.qty).toLocaleString('en-IN')}</span>${i.originalPrice?`<span class="ci-old">₹${(i.originalPrice*i.qty).toLocaleString('en-IN')}</span>`:''}</div>
          <div class="ci-actions">
            <div class="qty-ctrl">
              <button class="qb" onclick="changeQty('${i.id}',${i.qty-1})">−</button>
              <input class="qv" type="text" value="${i.qty}" readonly/>
              <button class="qb" onclick="changeQty('${i.id}',${i.qty+1})">+</button>
            </div>
            <button class="rm-btn" onclick="remove('${i.id}')" title="Remove">×</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function updateSummary(items){
  const t=calcCartTotals(items);
  document.getElementById('sumSubtotal').textContent=`₹${t.subtotal.toLocaleString('en-IN')}`;
  document.getElementById('sumDiscount').textContent=`–₹${t.discount.toLocaleString('en-IN')}`;
  document.getElementById('sumDelivery').textContent=t.delivery===0?'FREE':`₹${t.delivery}`;
  document.getElementById('sumTotal').textContent=`₹${t.total.toLocaleString('en-IN')}`;
}

window.changeQty=async(id,qty)=>{ if(qty<1){await removeFromCart(id);return;} await updateCartQty(id,qty); };
window.remove=async(id)=>{ const el=document.getElementById(`ci-${id}`); if(el){el.style.opacity='0';el.style.transform='translateX(20px)';el.style.transition='all .2s';setTimeout(()=>removeFromCart(id),200);} };
window.applyCoupon=function(){ const c=document.getElementById('couponInput').value.trim().toUpperCase(); if(c==='XZORA10')toast('10% discount applied! 🎉','success'); else toast('Invalid coupon code','error'); };
window.goCheckout=function(){ if(!cartItems.length){toast('Your cart is empty','error');return;} window.location.href='checkout.html'; };
</script>
</body>
</html>
